name: Data Retention Cleanup

# story-2.2 / TD-DB-010: Weekly cleanup of old search history records
# Executes the cleanup_old_searches() PostgreSQL function via psql.

on:
  schedule:
    # Every Sunday at 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      retention_days:
        description: 'Number of days to retain (default: 90)'
        required: false
        default: '90'
        type: string
      dry_run:
        description: 'Dry run (just count, no delete)'
        required: false
        default: 'false'
        type: boolean

jobs:
  cleanup:
    name: Cleanup Old Search History
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run retention cleanup
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          RETENTION_DAYS: ${{ github.event.inputs.retention_days || '90' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          echo "=== Data Retention Cleanup ==="
          echo "Retention period: ${RETENTION_DAYS} days"
          echo "Dry run: ${DRY_RUN}"

          if [ "$DRY_RUN" = "true" ]; then
            echo "--- DRY RUN: Counting records that would be deleted ---"
            psql "$SUPABASE_DB_URL" -c "
              SELECT count(*) AS records_to_delete
              FROM search_history
              WHERE status IN ('completed', 'failed', 'cancelled')
                AND created_at < NOW() - INTERVAL '${RETENTION_DAYS} days';
            "
          else
            echo "--- Executing cleanup_old_searches(${RETENTION_DAYS}) ---"
            psql "$SUPABASE_DB_URL" -c "
              SELECT cleanup_old_searches(${RETENTION_DAYS}::INTEGER);
            "
            echo "Cleanup completed successfully"
          fi

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `Data retention cleanup failed on ${new Date().toISOString().split('T')[0]}`;
            const body = `## Retention Cleanup Failure\n\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nThe weekly data retention cleanup failed. Please investigate.`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'data-retention']
            });
