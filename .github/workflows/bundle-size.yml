name: Bundle Size Check

on:
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  bundle-size:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build and analyze bundle
        run: |
          cd frontend
          ANALYZE=true npm run build
        env:
          SENTRY_AUTH_TOKEN: ""

      - name: Check bundle size budget
        run: |
          cd frontend
          # Check .next/BUILD_ID exists (build succeeded)
          if [ ! -f .next/BUILD_ID ]; then
            echo "Build failed"
            exit 1
          fi

          # Calculate total JS size of initial page load
          TOTAL_SIZE=$(find .next/static -name "*.js" -type f -exec wc -c {} + | tail -1 | awk '{print $1}')
          TOTAL_KB=$((TOTAL_SIZE / 1024))

          echo "Total JS bundle size: ${TOTAL_KB}KB"

          # Budget: 500KB for all JS (generous for Next.js with Sentry + Mixpanel)
          BUDGET=500

          if [ $TOTAL_KB -gt $BUDGET ]; then
            echo "::error::Bundle size ${TOTAL_KB}KB exceeds budget of ${BUDGET}KB"
            exit 1
          fi

          echo "Bundle size ${TOTAL_KB}KB is within budget of ${BUDGET}KB"
