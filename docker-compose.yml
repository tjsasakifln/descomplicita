# =============================================================================
# Descomplicita - Docker Compose Development Environment
# =============================================================================
# Orchestrates backend (FastAPI) + frontend (Next.js) + Redis for local dev.
# Updated story-2.2 / TD-SYS-010: Reflects Supabase + Redis stack.
#
# USAGE:
#   docker compose up           # Start all services
#   docker compose up -d        # Start in background (detached)
#   docker compose logs -f      # Follow logs
#   docker compose down         # Stop and remove containers
#   docker compose build        # Rebuild images after dependency changes
#
# REQUIREMENTS:
#   - Docker Engine 20.10+
#   - Docker Compose 2.0+
#   - .env file (copy from .env.example)
#
# NOTE: Supabase runs as a hosted service (supabase.com). This compose file
# connects to it via environment variables — there is no local Supabase container.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Redis (persistent storage for job state + PNCP cache)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: descomplicita-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - descomplicita-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Backend Service (FastAPI + Python 3.11)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: descomplicita-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # Mount source code for hot-reload
      - ./backend:/app
      # Exclude virtual environment from sync (performance)
      - /app/.pytest_cache
      - /app/__pycache__
    environment:
      # Backend Configuration
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=development

      # Redis
      - REDIS_URL=redis://redis:6379/0

      # Supabase (hosted service — story-2.2)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}

      # Auth
      - JWT_SECRET=${JWT_SECRET}
      - JWT_SECRET_PREVIOUS=${JWT_SECRET_PREVIOUS:-}
      - API_KEY=${API_KEY:-}

      # CORS
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}

      # PNCP Client Configuration
      - PNCP_BASE_URL=${PNCP_BASE_URL:-https://pncp.gov.br/api/consulta/v1}
      - PNCP_TIMEOUT=${PNCP_TIMEOUT:-30}
      - PNCP_MAX_RETRIES=${PNCP_MAX_RETRIES:-5}
      - PNCP_BACKOFF_BASE=${PNCP_BACKOFF_BASE:-2}
      - PNCP_BACKOFF_MAX=${PNCP_BACKOFF_MAX:-60}

      # LLM Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4.1-nano}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.3}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-500}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - descomplicita-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Frontend Service (Next.js)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: descomplicita-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_KEY}
      - BACKEND_URL=http://backend:8000
      - BACKEND_API_KEY=${API_KEY:-}
    networks:
      - descomplicita-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    depends_on:
      backend:
        condition: service_healthy

# =============================================================================
# Networks
# =============================================================================
networks:
  descomplicita-network:
    driver: bridge
    name: descomplicita-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  redis_data:
    driver: local
